server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: payment-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/payments/**

        - id: fraud-detection-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/fraud/**

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/notifications/**

        - id: ai-reasoning-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true